name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ libboost-dev

      - name: Record toolchain
        run: |
          python3 --version
          g++ --version

      - name: Build core kernels
        run: ./build.sh

      - name: Run smoke tests
        run: python3 tests/test_smoke.py
